services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: aiw-litellm
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    restart: unless-stopped
